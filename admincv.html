<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">

    <title>Admin CV | Quản lý Portfolio</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="cv.css">
    <style>
        /* ========================================
       ADMIN SPECIFIC STYLES
       ======================================== */

        /* Login Screen */
        .login-screen {
            position: fixed;
            inset: 0;
            background: var(--gradient-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--blue-primary);
            margin-bottom: 30px;
        }

        .login-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 2px;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--blue-primary);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: var(--gradient-main);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .login-error {
            color: #e53e3e;
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
        }

        /* Admin Header */
        .admin-header {
            background: white;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .admin-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--blue-primary);
        }

        .admin-brand i {
            font-size: 1.5rem;
        }

        .admin-actions {
            display: flex;
            gap: 10px;
        }

        .admin-btn {
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .admin-btn-primary {
            color: white;
            background: var(--blue-primary);
        }

        .admin-btn-primary:hover {
            background: var(--blue-dark);
        }

        .admin-btn-outline {
            color: var(--text-gray);
            background: transparent;
            border: 1px solid var(--border);
        }

        .admin-btn-outline:hover {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
        }

        .admin-btn-danger {
            color: #e53e3e;
            background: rgba(229, 62, 62, 0.1);
        }

        .admin-btn-danger:hover {
            background: rgba(229, 62, 62, 0.2);
        }

        /* Admin Tabs */
        .admin-tabs {
            background: var(--bg-light);
            border-bottom: 1px solid var(--border);
        }

        .admin-tabs .tabs {
            padding: 0;
        }

        .admin-tabs .tab {
            padding: 16px 24px;
            border-radius: 0;
        }

        .admin-tabs .tab.active::after {
            bottom: 0;
            width: 100%;
            left: 0;
            transform: none;
        }

        /* Admin Content */
        .admin-content {
            padding: 30px 0;
            min-height: calc(100vh - 200px);
        }

        /* Cards Grid */
        .admin-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        /* Form Card */
        .form-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow-md);
        }

        .form-card-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .form-group label span {
            color: #e53e3e;
        }

        /* Avatar Preview */
        .avatar-preview-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--border);
        }

        /* Item List */
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .item-card {
            background: white;
            border-radius: var(--radius-md);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            gap: 15px;
            transition: all var(--transition-fast);
        }

        .item-card:hover {
            border-color: var(--blue-primary);
            box-shadow: var(--shadow-md);
        }

        .item-image {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            flex-shrink: 0;
        }

        .item-info {
            flex: 1;
            min-width: 0;
        }

        .item-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-meta {
            font-size: 0.85rem;
            color: var(--text-gray);
            margin-bottom: 5px;
        }

        .item-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .item-btn {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .item-btn-edit {
            color: var(--blue-primary);
            background: rgba(0, 91, 150, 0.1);
        }

        .item-btn-delete {
            color: #e53e3e;
            background: rgba(229, 62, 62, 0.1);
        }

        /* Add Button */
        .add-btn {
            padding: 15px 25px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: var(--gradient-main);
            border-radius: var(--radius-md);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            transition: all var(--transition-fast);
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-gray);
            transition: all var(--transition-fast);
        }

        .modal-close:hover {
            background: var(--bg-light);
            color: var(--text-dark);
        }

        .modal-body {
            padding: 25px;
        }

        .modal-footer {
            padding: 20px 25px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Photos List */
        .photos-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .photo-item {
            width: 80px;
            height: 80px;
            position: relative;
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-remove {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            background: rgba(229, 62, 62, 0.9);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
        }

        .add-photo-btn {
            width: 80px;
            height: 80px;
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            color: var(--text-gray);
            font-size: 0.7rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .add-photo-btn i {
            font-size: 1.2rem;
        }

        .add-photo-btn:hover {
            border-color: var(--blue-primary);
            color: var(--blue-primary);
        }

        /* Tier Select */
        .tier-select {
            display: flex;
            gap: 10px;
        }

        .tier-option {
            flex: 1;
            padding: 12px;
            text-align: center;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .tier-option:hover {
            border-color: var(--text-gray);
        }

        .tier-option.active {
            border-color: var(--blue-primary);
            background: rgba(0, 91, 150, 0.05);
        }

        .tier-option.gold.active {
            border-color: var(--tier-gold);
            background: rgba(255, 215, 0, 0.1);
        }

        .tier-option.silver.active {
            border-color: var(--tier-silver);
            background: rgba(192, 192, 192, 0.1);
        }

        .tier-option.bronze.active {
            border-color: var(--tier-bronze);
            background: rgba(205, 127, 50, 0.1);
        }

        .tier-icon {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 5px;
        }

        .tier-label {
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-header-content {
                flex-direction: column;
                gap: 15px;
            }

            .admin-actions {
                width: 100%;
                justify-content: center;
            }

            .admin-cards {
                grid-template-columns: 1fr;
            }

            .item-card {
                flex-direction: column;
            }

            .item-image {
                width: 100%;
                height: 150px;
            }
        }
    </style>
</head>

<body>
    <!-- ========================================
       LOGIN SCREEN
       ======================================== -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="login-logo">🔐</div>
            <h1 class="login-title">Admin CV</h1>
            <form id="loginForm">
                <input type="password" class="login-input" id="loginPassword" placeholder="Nhập mật khẩu..." autofocus>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Đăng nhập
                </button>
            </form>
            <p class="login-error" id="loginError">Mật khẩu không đúng!</p>
        </div>
    </div>

    <!-- ========================================
       ADMIN CONTENT
       ======================================== -->
    <div class="admin-wrapper hidden" id="adminWrapper">

        <!-- Admin Header -->
        <header class="admin-header">
            <div class="container admin-header-content">
                <div class="admin-brand">
                    <i class="fas fa-images"></i>
                    <span>Admin CV</span>
                </div>
                <div class="admin-actions">
                    <a href="cv.html" class="admin-btn admin-btn-primary" target="_blank">
                        <i class="fas fa-external-link-alt"></i>
                        Xem Portfolio
                    </a>
                    <button class="admin-btn admin-btn-danger" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        Đăng xuất
                    </button>
                </div>
            </div>
        </header>

        <!-- Admin Tabs -->
        <nav class="tabs-container admin-tabs">
            <div class="container">
                <div class="tabs">
                    <button class="tab active" data-tab="profile">
                        <span class="tab-icon">👤</span>
                        <span class="tab-text">Hồ sơ</span>
                    </button>
                    <button class="tab" data-tab="albums">
                        <span class="tab-icon">📸</span>
                        <span class="tab-text">Albums</span>
                    </button>
                    <button class="tab" data-tab="achievements">
                        <span class="tab-icon">🏆</span>
                        <span class="tab-text">Thành tích</span>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Admin Content -->
        <main class="admin-content">
            <div class="container">

                <!-- Profile Tab -->
                <div class="tab-pane active" id="profile">
                    <div class="admin-cards">
                        <div class="form-card">
                            <h2 class="form-card-title">
                                <i class="fas fa-user-edit"></i>
                                Thông tin cá nhân
                            </h2>
                            <form id="profileForm">
                                <div class="form-group">
                                    <label>Họ và tên <span>*</span></label>
                                    <input type="text" class="form-input" id="inputName" required>
                                </div>
                                <div class="form-group">
                                    <label>Trường / Đơn vị</label>
                                    <input type="text" class="form-input" id="inputSchool">
                                </div>
                                <div class="form-group">
                                    <label>Chức vụ / Vai trò</label>
                                    <input type="text" class="form-input" id="inputPosition">
                                </div>
                                <div class="form-group">
                                    <label>Giới thiệu bản thân</label>
                                    <textarea class="form-input" id="inputBio" rows="4"></textarea>
                                </div>
                                <button type="submit" class="btn-submit">
                                    <i class="fas fa-save"></i>
                                    Lưu thay đổi
                                </button>
                            </form>
                        </div>

                        <div class="form-card">
                            <h2 class="form-card-title">
                                <i class="fas fa-camera"></i>
                                Ảnh đại diện
                            </h2>
                            <div class="avatar-preview-wrapper">
                                <img class="avatar-preview" id="avatarPreview" src="https://i.imgur.com/8Km9tLL.png"
                                    alt="Avatar">
                                <div class="form-group" style="width: 100%;">
                                    <label>URL ảnh đại diện</label>
                                    <input type="url" class="form-input" id="inputAvatar" placeholder="https://...">
                                </div>
                                <button type="button" class="admin-btn admin-btn-primary" onclick="updateAvatar()">
                                    <i class="fas fa-sync"></i>
                                    Cập nhật Avatar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Albums Tab -->
                <div class="tab-pane" id="albums">
                    <button class="add-btn" onclick="openAlbumModal()">
                        <i class="fas fa-plus"></i>
                        Thêm Album mới
                    </button>

                    <div class="item-list" id="albumsList">
                        <!-- Albums will be loaded here -->
                    </div>

                    <div class="empty-state hidden" id="emptyAlbums">
                        <i class="fas fa-images"></i>
                        <p>Chưa có album nào</p>
                        <button class="add-btn" onclick="openAlbumModal()">
                            <i class="fas fa-plus"></i>
                            Tạo album đầu tiên
                        </button>
                    </div>
                </div>

                <!-- Achievements Tab -->
                <div class="tab-pane" id="achievements">
                    <button class="add-btn" onclick="openAchievementModal()">
                        <i class="fas fa-plus"></i>
                        Thêm Thành tích mới
                    </button>

                    <div class="item-list" id="achievementsList">
                        <!-- Achievements will be loaded here -->
                    </div>

                    <div class="empty-state hidden" id="emptyAchievements">
                        <i class="fas fa-trophy"></i>
                        <p>Chưa có thành tích nào</p>
                        <button class="add-btn" onclick="openAchievementModal()">
                            <i class="fas fa-plus"></i>
                            Thêm thành tích đầu tiên
                        </button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- ========================================
       ALBUM MODAL
       ======================================== -->
    <div class="modal-overlay" id="albumModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="albumModalTitle">Thêm Album</h3>
                <button class="modal-close" onclick="closeAlbumModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="albumForm">
                <div class="modal-body">
                    <input type="hidden" id="albumId">

                    <div class="form-group">
                        <label>Tên album <span>*</span></label>
                        <input type="text" class="form-input" id="albumTitle" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Ngày</label>
                            <input type="date" class="form-input" id="albumDate">
                        </div>
                        <div class="form-group">
                            <label>Địa điểm</label>
                            <input type="text" class="form-input" id="albumLocation">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Mô tả</label>
                        <textarea class="form-input" id="albumDescription" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Ảnh bìa (URL)</label>
                        <input type="url" class="form-input" id="albumCover" placeholder="https://...">
                    </div>

                    <div class="form-group">
                        <label>Danh sách ảnh</label>
                        <div class="photos-list" id="photosListPreview">
                            <!-- Photos will be added here -->
                        </div>
                        <input type="hidden" id="albumPhotos">
                        <div style="margin-top: 10px;">
                            <input type="url" class="form-input" id="newPhotoUrl" placeholder="Nhập URL ảnh mới...">
                            <button type="button" class="admin-btn admin-btn-outline" style="margin-top: 10px;"
                                onclick="addPhoto()">
                                <i class="fas fa-plus"></i>
                                Thêm ảnh
                            </button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="admin-btn admin-btn-outline" onclick="closeAlbumModal()">Hủy</button>
                    <button type="submit" class="admin-btn admin-btn-primary">
                        <i class="fas fa-save"></i>
                        Lưu Album
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ========================================
       ACHIEVEMENT MODAL
       ======================================== -->
    <div class="modal-overlay" id="achievementModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="achievementModalTitle">Thêm Thành tích</h3>
                <button class="modal-close" onclick="closeAchievementModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="achievementForm">
                <div class="modal-body">
                    <input type="hidden" id="achievementId">

                    <div class="form-group">
                        <label>Tên thành tích <span>*</span></label>
                        <input type="text" class="form-input" id="achievementName" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Danh mục</label>
                            <input type="text" class="form-input" id="achievementCategory"
                                placeholder="VD: Học thuật, Văn hóa...">
                        </div>
                        <div class="form-group">
                            <label>Ngày đạt được</label>
                            <input type="date" class="form-input" id="achievementDate">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Hạng giải</label>
                        <div class="tier-select" id="tierSelect">
                            <div class="tier-option gold" data-tier="gold" onclick="selectTier('gold')">
                                <span class="tier-icon">🥇</span>
                                <span class="tier-label">Vàng</span>
                            </div>
                            <div class="tier-option silver" data-tier="silver" onclick="selectTier('silver')">
                                <span class="tier-icon">🥈</span>
                                <span class="tier-label">Bạc</span>
                            </div>
                            <div class="tier-option bronze" data-tier="bronze" onclick="selectTier('bronze')">
                                <span class="tier-icon">🥉</span>
                                <span class="tier-label">Đồng</span>
                            </div>
                        </div>
                        <input type="hidden" id="achievementTier" value="gold">
                    </div>

                    <div class="form-group">
                        <label>Ảnh minh họa (URL)</label>
                        <input type="url" class="form-input" id="achievementImage" placeholder="https://...">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="admin-btn admin-btn-outline"
                        onclick="closeAchievementModal()">Hủy</button>
                    <button type="submit" class="admin-btn admin-btn-primary">
                        <i class="fas fa-save"></i>
                        Lưu Thành tích
                    </button>
                </div>
            </form>
        </div>
    </div>
